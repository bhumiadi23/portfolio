<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — CyberShield</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="shield">🛡️</div>
      <h2>CYBERSHIELD</h2>
      <p>SECURE ACCESS PORTAL</p>
    </div>
    <div id="alert"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">⚡ AUTHENTICATE</button>
    <hr class="divider">
    <p style="text-align:center;font-family:var(--mono);font-size:12px;color:var(--text2)">
      No account? <a href="register.html" style="color:var(--green)">Register</a>
      &nbsp;|&nbsp; <a href="index.html" style="color:var(--text2)">← Home</a>
    </p>
    <div style="margin-top:16px;padding:12px;background:var(--bg2);border:1px solid var(--border2);font-family:var(--mono);font-size:11px;color:var(--text2)">
      Demo: <span style="color:var(--green)">admin / password</span>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
<script>
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const alert = document.getElementById('alert');
  alert.innerHTML = '';
  if (!username || !password) {
    alert.innerHTML = '<div class="alert alert-error">All fields required</div>';
    return;
  }
  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ username, password })
    });
    location.href = data.role === 'admin' ? 'admin.html' : 'dashboard.html';
  } catch (e) {
    alert.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
}
</script>
</body>
</html>
