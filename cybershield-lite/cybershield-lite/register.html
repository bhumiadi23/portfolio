<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register — CyberShield</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="shield">🛡️</div>
      <h2>CYBERSHIELD</h2>
      <p>CREATE ACCOUNT</p>
    </div>
    <div id="alert"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Choose username">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat password">
    </div>
    <button class="btn btn-primary btn-full" onclick="doRegister()">⚡ CREATE ACCOUNT</button>
    <hr class="divider">
    <p style="text-align:center;font-family:var(--mono);font-size:12px;color:var(--text2)">
      Have an account? <a href="login.html" style="color:var(--green)">Login</a>
    </p>
  </div>
</div>
<script src="js/app.js"></script>
<script>
async function doRegister() {
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const alert = document.getElementById('alert');
  alert.innerHTML = '';

  if (!username || !email || !password)
    return alert.innerHTML = '<div class="alert alert-error">All fields required</div>';
  if (password !== confirm)
    return alert.innerHTML = '<div class="alert alert-error">Passwords do not match</div>';
  if (password.length < 6)
    return alert.innerHTML = '<div class="alert alert-error">Password min 6 characters</div>';

  try {
    await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({ username, email, password })
    });
    location.href = 'dashboard.html';
  } catch (e) {
    alert.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
}
</script>
</body>
</html>
